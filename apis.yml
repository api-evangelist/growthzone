aid: growthzone
url: https://raw.githubusercontent.com/api-evangelist/growthzone/refs/heads/main/apis.yml
name: GrowthZone
kind: company
description: GrowthZone is association management software (AMS) for chambers of commerce,
  trade and professional associations, and member-based organizations - covering membership
  management, member and organization contacts, event registration, invoicing and
  scheduled billing, member directories, certifications, and communications. The GrowthZone
  REST API (base https://{subdomain}.growthzoneapp.com/api) exposes this data programmatically
  for CMS/directory embeds, SSO, and mobile integrations. It is a partner/customer-gated
  API - access requires an account with API Access enabled and an API Key issued by GrowthZone
  WebSupport - and is documented publicly at integration.growthzone.com. GrowthZone also
  operates ChamberMaster and MemberZone, which expose a separate legacy REST API. OAuth 2.0 /
  OpenID Connect is supported for SSO.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Association Management
- AMS
- Membership Management
- Chambers of Commerce
- ChamberMaster
- Member Directory
- Events
- Billing
created: '2026-07-05'
modified: '2026-07-05'
specificationVersion: '0.19'
