meters:
- name: platform_subscription
  description: Annual GrowthZone AMS subscription, tiered by organization size / member count.
  unit: subscription
  aggregation: sum
  dimensions:
  - account
- name: api_access
  description: API Access add-on enablement fee, when the base subscription does not already include it.
  unit: subscription
  aggregation: sum
  dimensions:
  - account
- name: member_count
  description: Number of members / records, the primary driver of subscription tier.
  unit: members
  aggregation: max
  dimensions:
  - account
principles:
- name: Visibility
  description: Treat GrowthZone as a fixed annual subscription line item; there is no per-call API meter to monitor.
- name: Allocation
  description: Attribute the subscription (and any API/enterprise fees) to the association department that owns member operations.
- name: Optimization
  description: Right-size the subscription tier to actual member count; use the delta feed to integrate efficiently rather than adding modules you do not use.
- name: Accountability
  description: Review the subscription and any API-access line items at annual renewal against realized integration value.
