description: >-
  FinOps view of GrowthZone spend. GrowthZone is a SaaS association management
  platform billed as a quote-based annual subscription tiered by organization
  size / member count, with API Access as a gated add-on enabled per account.
  There is no public usage-metered API billing - the API rides on the underlying
  subscription rather than being charged per call. The dominant cost is therefore
  the platform subscription (and any enablement/enterprise fees), not per-request
  API consumption.
notes: >-
  Per-unit and per-tier prices are not public; all pricing is contact-sales. Track
  spend as a fixed annual subscription plus any negotiated API/enterprise line
  items rather than as variable API usage. Confirm the invoice structure with
  GrowthZone during reconciliation.
