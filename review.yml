    - GET  https://{subdomain}.growthzoneapp.com/api/contacts/person/{contactId}/categorySummary
    - GET  https://{subdomain}.growthzoneapp.com/api/contacts/person/{contactId}/memberships
    - GET  https://{subdomain}.growthzoneapp.com/api/contacts/org/{contactId}/groups
