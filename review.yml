actions:
  asyncapiPath: null
  apisYmlUpdated: true
  reason: |
    No WebSocket protocol surface exists. GrowthZone's public API is
    request/response REST (with OAuth/OIDC for SSO), gated behind an issued API
    Key. No AsyncAPI document was created because there is no server-push
    transport on GrowthZone's own API to model; near-real-time syncing is done by
    polling the REST delta feed rather than over a socket.
